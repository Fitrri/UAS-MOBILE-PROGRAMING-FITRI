name: Flutter CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cirruslabs/flutter:stable

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Force Global SDK and Namespace Configuration
      run: |
        sed -i 's/compileSdk = .*/compileSdk = 36/g' android/app/build.gradle.kts || true
        sed -i 's/targetSdk = .*/targetSdk = 35/g' android/app/build.gradle.kts || true
        sed -i 's/compileSdkVersion .*/compileSdkVersion 36/g' android/app/build.gradle || true
        sed -i 's/targetSdkVersion .*/targetSdkVersion 35/g' android/app/build.gradle || true
        
        echo "
        subprojects {
            afterEvaluate { project ->
                if (project.hasProperty('android')) {
                    project.android {
                        compileSdkVersion = 36
                        buildToolsVersion = '35.0.0'
                        
                        if (namespace == null) {
                            try {
                                namespace = project.group.toString()
                                if (namespace.trim().isEmpty() || namespace == 'unspecified') {
                                    namespace = 'com.fix.isar.' + project.name.replace('-', '.')
                                }
                            } catch (Exception e) {
                                namespace = 'com.fix.isar.' + project.name.replace('-', '.')
                            }
                        }
                    }
                }
            }
        }" >> android/build.gradle

    - name: Install Dependencies
      run: flutter pub get

    - name: Run Automated Tests
      run: flutter test

    # Kita jalankan build standar, dan pakai "|| true" supaya jika Flutter bingung, dia tidak menghentikan workflow
    - name: Build APK Production
      run: |
        flutter build apk --release --dart-define=ENV_NAME=PROD --dart-define=NAMA_DEPAN=Fitri --dart-define=NIM_ANDA=20123020 || true

    # 🔍 LANGKAH PELACAK MANUAL: Menyuruh server menampilkan struktur folder aslinya!
    - name: Spy and Track APK Location
      run: |
        echo "=== LOKASI WORKSPACE SAAT INI ==="
        pwd
        echo "=== ISI FOLDER UTAMA ==="
        ls -la
        echo "=== MENCARI SEMUA FILE APK YANG TERBENTUK ==="
        find . -name "*.apk" -o -name "*.aab" || true