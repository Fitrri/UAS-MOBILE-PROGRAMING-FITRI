name: Flutter CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true # ⚡ Menambahkan cache agar proses download dependencies lebih cepat

    # 🔑 LANGKAH KRUSIAL: Menyetujui semua lisensi Android SDK secara otomatis di server
    - name: Accept Android Licenses
      run: |
        mkdir -p ${ANDROID_HOME}/licenses
        echo -e "\n24333f1a63b6b1f96d3d316267e00a72fa1e37d1" > ${ANDROID_HOME}/licenses/android-sdk-license
        echo -e "\n8516d471acb7bf7560d27ec4791db747461436c8" > ${ANDROID_HOME}/licenses/android-sdk-preview-license
        flutter doctor --android-licenses || true

    - name: Install Dependencies
      run: flutter pub get

    - name: Run Automated Tests
      run: flutter test

    # Membangun APK dengan parameter UAS milikmu
    - name: Build APK Production
      run: flutter build apk --dart-define=ENV_NAME=PROD --dart-define=NAMA_DEPAN=Fitri --dart-define=NIM_ANDA=20123020 --release

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: uas-app-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk