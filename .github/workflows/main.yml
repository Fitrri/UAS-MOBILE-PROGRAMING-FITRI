name: Flutter CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # ⚡ Setup Flutter + Aktifkan Cache Otomatis agar tidak macet/lama
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true
        cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"

    - name: Install Dependencies
      run: flutter pub get

    - name: Run Automated Tests
      run: flutter test

    # 📦 Build APK dengan mematikan daemon agar server fokus rakit file
    - name: Build APK Production
      run: flutter build apk --dart-define=ENV_NAME=PROD --dart-define=NAMA_DEPAN=Fitri --dart-define=NIM_ANDA=20123020 --release

    # 📤 Unggah Hasil Build ke Artifacts (Untuk rilis)
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: uas-app-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk