name: Flutter CI/CD Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository kode kamu
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. Setup lingkungan Java JDK untuk kompilasi Android Gradle
      - name: Setup Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Setup lingkungan Flutter SDK terbaru
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 4. Ambil seluruh library dependensi proyek (termasuk image_picker & shared_preferences)
      - name: Install Dependencies
        run: flutter pub get

      # 5. Jalankan Automated Unit Testing (Memenuhi syarat Poin 5 Soal)
      - name: Run Unit Tests
        run: flutter test

      # 6. Build APK Release secara otomatis menggunakan Flavor PROD (Memenuhi syarat Poin 1 & 5)
      - name: Build APK PROD Release
        run: flutter build apk --release --dart-define=ENV_NAME=PROD --dart-define=NAMA_DEPAN=Fitri --dart-define=NIM_ANDA=20123020

      # 7. Unggah file APK hasil build sebagai Artifact agar bisa diunduh linknya untuk dikumpulkan
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: production-apk
          path: build/app/outputs/flutter-apk/app-release.apk