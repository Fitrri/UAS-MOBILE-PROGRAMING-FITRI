name: Flutter CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cirruslabs/flutter:stable

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 🛠️ LANGKAH PENYELAMAT GLOBAL + FIX NAMESPACE
    - name: Force Global SDK and Namespace Configuration
      run: |
        # 1. Ubah file build.gradle utama aplikasi dulu
        sed -i 's/compileSdk = .*/compileSdk = 36/g' android/app/build.gradle.kts || true
        sed -i 's/targetSdk = .*/targetSdk = 35/g' android/app/build.gradle.kts || true
        sed -i 's/compileSdkVersion .*/compileSdkVersion 36/g' android/app/build.gradle || true
        sed -i 's/targetSdkVersion .*/targetSdkVersion 35/g' android/app/build.gradle || true
        
        # 2. SAKTI: Paksa seluruh sub-project patuh ke SDK 36 DAN otomatis buat namespace jika belum ada
        echo "
        subprojects {
            afterEvaluate { project ->
                if (project.hasProperty('android')) {
                    project.android {
                        compileSdkVersion = 36
                        buildToolsVersion = '35.0.0'
                        
                        // Perbaikan Error: Namespace not specified
                        if (namespace == null) {
                            try {
                                namespace = project.group.toString()
                                if (namespace.trim().isEmpty() || namespace == 'unspecified') {
                                    namespace = 'com.fix.isar.' + project.name.replace('-', '.')
                                }
                            } catch (Exception e) {
                                namespace = 'com.fix.isar.' + project.name.replace('-', '.')
                            }
                        }
                    }
                }
            }
        }" >> android/build.gradle

    - name: Install Dependencies
      run: flutter pub get

    - name: Run Automated Tests
      run: flutter test

    - name: Build APK Production
      run: flutter build apk --dart-define=ENV_NAME=PROD --dart-define=NAMA_DEPAN=Fitri --dart-define=NIM_ANDA=20123020 --release

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: uas-app-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk