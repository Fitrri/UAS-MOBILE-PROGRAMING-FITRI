name: Flutter CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cirruslabs/flutter:stable

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 🛠️ LANGKAH PENYELAMAT (SUDAH DIPERBAIKI KE SDK 36)
    - name: Force SDK Configuration
      run: |
        sed -i 's/compileSdk = .*/compileSdk = 36/g' android/app/build.gradle.kts || true
        sed -i 's/targetSdk = .*/targetSdk = 35/g' android/app/build.gradle.kts || true
        sed -i 's/compileSdkVersion .*/compileSdkVersion 36/g' android/app/build.gradle || true
        sed -i 's/targetSdkVersion .*/targetSdkVersion 35/g' android/app/build.gradle || true

    - name: Install Dependencies
      run: flutter pub get

    - name: Run Automated Tests
      run: flutter test

    - name: Build APK Production
      run: flutter build apk --dart-define=ENV_NAME=PROD --dart-define=NAMA_DEPAN=Fitri --dart-define=NIM_ANDA=20123020 --release

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: uas-app-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk